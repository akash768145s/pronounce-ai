services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: '["http://localhost:3000"]'
      ENABLE_WHISPERX: "false"

  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
